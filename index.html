<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevOps Pipeline Puzzle</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --cell-bg: #161b22;
            --cell-border: #30363d;
            --path-color: #238636; /* GitHub Green */
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --error-color: #f85149;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        p.instructions {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
            max-width: 320px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 75px);
            grid-template-rows: repeat(4, 75px);
            gap: 8px;
            margin-bottom: 20px;
            touch-action: none; /* Prevent scrolling while swiping */
        }

        .cell {
            background-color: var(--cell-bg);
            border: 2px solid var(--cell-border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            transition: all 0.15s ease;
            user-select: none;
        }

        .cell span.icon {
            font-size: 16px;
            margin-bottom: 2px;
        }

        .visited {
            background-color: var(--path-color);
            border-color: #2ea043;
            color: #ffffff;
        }

        .head {
            box-shadow: 0 0 15px rgba(46, 160, 67, 0.8);
            transform: scale(1.05);
        }

        #status {
            font-size: 18px;
            font-weight: bold;
            height: 24px;
            margin-bottom: 15px;
        }

        .success { color: var(--path-color); }
        .error { color: var(--error-color); }

        button {
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid var(--cell-border);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        button:hover {
            background-color: #30363d;
        }
    </style>
</head>
<body>

    <h1>DevOps Pipeline</h1>
    <p class="instructions">Swipe or use Arrow Keys. Connect Source Code to Production. Visit ALL squares. Hit checkpoints in order.</p>

    <div id="status"></div>
    <div id="grid"></div>
    <button onclick="initGame()">Restart Pipeline</button>

    <script>
        const COLS = 4;
        const ROWS = 4;
        const START_POS = { x: 0, y: 1 }; // Adjusted to make puzzle solvable!
        const END_POS = { x: 3, y: 3 };
        
        // Define checkpoints and special cells
        const CELL_DATA = {
            "0,1": { label: "Source", icon: "📄" },
            "3,3": { label: "Prod", icon: "🚀" },
            "2,0": { label: "[1] Test", icon: "🧪", order: 1 },
            "2,1": { label: "[2] Sec", icon: "🛡️", order: 2 },
            "0,3": { label: "[3] Build", icon: "🐳", order: 3 },
            "2,3": { label: "[4] Stage", icon: "server", order: 4 } // Fallback to text if emoji fails
        };

        let path = [];
        let gameOver = false;
        const gridElement = document.getElementById('grid');
        const statusElement = document.getElementById('status');

        function initGame() {
            path = [{ ...START_POS }];
            gameOver = false;
            statusElement.innerHTML = "";
            createGrid();
            render();
        }

        function createGrid() {
            gridElement.innerHTML = '';
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${x}-${y}`;
                    
                    const key = `${x},${y}`;
                    if (CELL_DATA[key]) {
                        cell.innerHTML = `<span class="icon">${CELL_DATA[key].icon}</span>${CELL_DATA[key].label}`;
                    }
                    gridElement.appendChild(cell);
                }
            }
        }

        function render() {
            // Clear previous states
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('visited', 'head');
            });

            // Draw path
            path.forEach((p, index) => {
                const cell = document.getElementById(`cell-${p.x}-${p.y}`);
                if (cell) {
                    cell.classList.add('visited');
                    // Mark the current head of the path
                    if (index === path.length - 1) {
                        cell.classList.add('head');
                    }
                }
            });
        }

        function move(dx, dy) {
            if (gameOver) return;

            const current = path[path.length - 1];
            const nextX = current.x + dx;
            const nextY = current.y + dy;

            // Bounds check
            if (nextX < 0 || nextX >= COLS || nextY < 0 || nextY >= ROWS) return;

            // Backtrack logic (Undo move)
            if (path.length > 1) {
                const prev = path[path.length - 2];
                if (prev.x === nextX && prev.y === nextY) {
                    path.pop();
                    render();
                    return;
                }
            }

            // Prevent crossing own path
            if (path.some(p => p.x === nextX && p.y === nextY)) return;

            // Valid move
            path.push({ x: nextX, y: nextY });
            render();

            // Check End Condition
            if (nextX === END_POS.x && nextY === END_POS.y) {
                evaluateWin();
            }
        }

        function evaluateWin() {
            gameOver = true;
            
            // 1. Check if all squares were visited (16 total)
            if (path.length < (COLS * ROWS)) {
                statusElement.innerHTML = "<span class='error'>Pipeline Failed: Code coverage not 100%</span>";
                return;
            }

            // 2. Check checkpoint order
            let hitOrder = [];
            path.forEach(p => {
                const key = `${p.x},${p.y}`;
                if (CELL_DATA[key] && CELL_DATA[key].order) {
                    hitOrder.push(CELL_DATA[key].order);
                }
            });

            const isCorrectOrder = hitOrder.length === 4 && hitOrder.every((val, index) => val === index + 1);

            if (isCorrectOrder) {
                statusElement.innerHTML = "<span class='success'>Deployment Successful! 🎉</span>";
            } else {
                statusElement.innerHTML = "<span class='error'>Pipeline Failed: Checkpoints out of order</span>";
            }
        }

        // --- Event Listeners ---

        // Keyboard Controls
        window.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': move(0, -1); break;
                case 'ArrowDown': move(0, 1); break;
                case 'ArrowLeft': move(-1, 0); break;
                case 'ArrowRight': move(1, 0); break;
            }
        });

        // Swipe Controls for Mobile
        let touchStartX = 0;
        let touchStartY = 0;

        gridElement.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        gridElement.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].screenX - touchStartX;
            let dy = e.changedTouches[0].screenY - touchStartY;
            
            // Require a minimum swipe distance
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    move(dx > 0 ? 1 : -1, 0); // Horizontal
                } else {
                    move(0, dy > 0 ? 1 : -1); // Vertical
                }
            }
        });

        // Initialize on load
        initGame();
    </script>
</body>
</html>
