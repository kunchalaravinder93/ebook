<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DevOps Rush</title>

<style>

body{
margin:0;
font-family:monospace;
background:#0f172a;
color:white;
overflow:hidden;
}

#hud{
position:fixed;
top:0;
width:100%;
height:60px;
background:#020617;
display:flex;
justify-content:space-around;
align-items:center;
z-index:100;
border-bottom:2px solid #334155;
}

#game{
position:absolute;
top:60px;
bottom:0;
width:100%;
overflow:hidden;
}

.zone{
border:2px dashed #64748b;
border-radius:10px;
padding:10px;
text-align:center;
}

.item{
background:#1e293b;
padding:12px;
border-radius:8px;
position:absolute;
cursor:pointer;
touch-action:none;
}

.center{
text-align:center;
padding-top:120px;
}

button{
padding:12px 24px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.alert{
background:#7f1d1d;
}

.fix{
background:#065f46;
}

</style>
</head>

<body>

<div id="hud">
<div>Stage: <span id="stage">INIT</span></div>
<div>Score: <span id="score">0</span></div>
<div>Health: <span id="health">100</span></div>
<div>Time: <span id="time">0</span></div>
</div>

<div id="game"></div>

<script>

const GameState={
INIT:"INIT",
BUILD:"BUILD",
DEPLOY:"DEPLOY",
INCIDENT:"INCIDENT",
SCORE:"SCORE"
}

let state=GameState.INIT
let score=0
let health=100
let timer=60
let dragItem=null

const game=document.getElementById("game")

function updateHUD(){
document.getElementById("stage").innerText=state
document.getElementById("score").innerText=score
document.getElementById("health").innerText=health
document.getElementById("time").innerText=timer
}

function clearGame(){
game.innerHTML=""
}

function startTimer(){
timer=30
let t=setInterval(()=>{
timer--
updateHUD()
if(timer<=0){
clearInterval(t)
nextStage()
}
},1000)
}

function nextStage(){

if(state===GameState.BUILD){
state=GameState.DEPLOY
deployGame()
return
}

if(state===GameState.DEPLOY){
state=GameState.INCIDENT
incidentGame()
return
}

if(state===GameState.INCIDENT){
state=GameState.SCORE
scoreScreen()
}

}

function initGame(){

clearGame()

let div=document.createElement("div")
div.className="center"
div.innerHTML=`
<h1>🚀 DevOps Rush</h1>
<p>Survive CI/CD pipeline chaos</p>
<button onclick="startGame()">Start</button>
`

game.appendChild(div)

}

function startGame(){
state=GameState.BUILD
score=0
health=100
buildGame()
}

function buildGame(){

clearGame()
updateHUD()
startTimer()

let stages=["Code","Build","Test","Artifact"]

stages.forEach((s,i)=>{
let zone=document.createElement("div")
zone.className="zone"
zone.style.position="absolute"
zone.style.left=(i*25)+"%"
zone.style.top="40%"
zone.style.width="24%"
zone.style.height="120px"
zone.innerHTML=s
zone.dataset.name=s
game.appendChild(zone)
})

let items=["Code","Build","Test","Artifact"]

items.sort(()=>Math.random()-0.5)

items.forEach((it,i)=>{
let el=document.createElement("div")
el.className="item"
el.innerText=it
el.style.left=(50+Math.random()*200)+"px"
el.style.top=(80+Math.random()*200)+"px"
enableDrag(el)
game.appendChild(el)
})

}

function deployGame(){

clearGame()
updateHUD()
startTimer()

let zones=["LoadBalancer","App","Database"]

zones.forEach((z,i)=>{
let zone=document.createElement("div")
zone.className="zone"
zone.style.position="absolute"
zone.style.left="35%"
zone.style.top=(100+i*120)+"px"
zone.style.width="30%"
zone.style.height="100px"
zone.innerHTML=z
zone.dataset.name=z
game.appendChild(zone)
})

let items=["LoadBalancer","App","Database"]

items.sort(()=>Math.random()-0.5)

items.forEach((it,i)=>{
let el=document.createElement("div")
el.className="item"
el.innerText=it
el.style.left=(20+Math.random()*300)+"px"
el.style.top=(80+Math.random()*200)+"px"
enableDrag(el)
game.appendChild(el)
})

}

function incidentGame(){

clearGame()
updateHUD()
startTimer()

spawnIncident()

setInterval(spawnIncident,4000)

}

function spawnIncident(){

if(state!==GameState.INCIDENT)return

let issues=[
{problem:"High CPU",fix:"Scale"},
{problem:"Pod Crash",fix:"Restart"},
{problem:"Disk Full",fix:"Clean Logs"},
{problem:"Latency",fix:"Cache"}
]

let i=issues[Math.floor(Math.random()*issues.length)]

let alert=document.createElement("div")
alert.className="item alert"
alert.innerText=i.problem
alert.dataset.fix=i.fix
alert.style.left=(Math.random()*window.innerWidth)+"px"
alert.style.top=(100+Math.random()*300)+"px"
game.appendChild(alert)

let fix=document.createElement("div")
fix.className="item fix"
fix.innerText=i.fix
fix.style.left=(Math.random()*window.innerWidth)+"px"
fix.style.top=(300+Math.random()*200)+"px"
enableDrag(fix)
game.appendChild(fix)

}

function enableDrag(el){

el.addEventListener("pointerdown",e=>{
dragItem=el
})

window.addEventListener("pointermove",e=>{
if(!dragItem)return
dragItem.style.left=(e.clientX-40)+"px"
dragItem.style.top=(e.clientY-20)+"px"
})

window.addEventListener("pointerup",e=>{
if(!dragItem)return
checkDrop(dragItem)
dragItem=null
})

}

function checkDrop(el){

let zones=document.querySelectorAll(".zone")

zones.forEach(z=>{

let r=z.getBoundingClientRect()
let e=el.getBoundingClientRect()

if(
e.left<r.right &&
e.right>r.left &&
e.top<r.bottom &&
e.bottom>r.top
){

if(el.innerText===z.dataset.name){
score+=10
el.remove()
}
else{
health-=10
}

updateHUD()

}

})

if(state===GameState.INCIDENT){

let alerts=document.querySelectorAll(".alert")

alerts.forEach(a=>{

let r=a.getBoundingClientRect()
let e=el.getBoundingClientRect()

if(
e.left<r.right &&
e.right>r.left &&
e.top<r.bottom &&
e.bottom>r.top
){

if(el.innerText===a.dataset.fix){
score+=20
a.remove()
el.remove()
}
else{
health-=10
}

updateHUD()

}

})

}

}

function scoreScreen(){

clearGame()

let div=document.createElement("div")
div.className="center"
div.innerHTML=`
<h1>Game Complete</h1>
<h2>Score: ${score}</h2>
<button onclick="startGame()">Play Again</button>
`

game.appendChild(div)

}

initGame()

</script>

</body>
</html>
