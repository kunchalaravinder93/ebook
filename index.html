<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevOps Pipeline Puzzle</title>
    <style>
        :root {
            --bg: #0d1117;
            --cell-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --green: #2ea043;
            --green-glow: #3fb950;
            --blue: #58a6ff;
            --purple: #bc8cff;
            --yellow: #d29922;
            --red: #f85149;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* Prevents scroll on mobile swipe */
        }

        h1 { color: var(--text); margin-bottom: 5px; font-size: 1.8rem;}
        p.subtitle { color: #8b949e; margin-top: 0; font-size: 0.9rem; text-align: center; max-width: 320px; }

        .banner {
            background: var(--cell-bg);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            min-width: 280px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .banner.fail { border-color: var(--red); color: var(--red); }
        .banner.success { border-color: var(--green); color: var(--green-glow); }

        .grid-container {
            background: #21262d;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .cell {
            width: 70px;
            height: 70px;
            background: var(--cell-bg);
            border: 2px solid var(--border);
            border-radius: 6px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.65rem;
            font-weight: bold;
            user-select: none;
            box-sizing: border-box;
        }

        @media(max-width: 400px) {
            .cell { width: 60px; height: 60px; font-size: 0.6rem; }
            h1 { font-size: 1.5rem; }
        }

        .cell.start { border-color: var(--blue); color: var(--blue); }
        .cell.end { border-color: var(--purple); color: var(--purple); }
        .cell.checkpoint { border-color: var(--yellow); color: var(--yellow); }
        
        /* Label background to ensure readability over lines */
        .cell span {
            z-index: 3;
            pointer-events: none;
            background: rgba(22, 27, 34, 0.85);
            padding: 2px 4px;
            border-radius: 4px;
            line-height: 1.1;
        }

        /* Path visual elements */
        .dot {
            position: absolute;
            top: 50%; left: 50%;
            width: 12px; height: 12px;
            background: var(--green);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
        .cell.current .dot {
            width: 18px; height: 18px;
            background: var(--green-glow);
            box-shadow: 0 0 10px var(--green-glow);
        }

        /* Continuous line connections */
        .line-right, .line-left, .line-up, .line-down {
            position: absolute;
            background: var(--green);
            z-index: 1;
        }
        .line-right { top: calc(50% - 3px); left: 50%; width: calc(100% + 10px); height: 6px; }
        .line-left { top: calc(50% - 3px); right: 50%; width: calc(100% + 10px); height: 6px; }
        .line-down { left: calc(50% - 3px); top: 50%; height: calc(100% + 10px); width: 6px; }
        .line-up { left: calc(50% - 3px); bottom: 50%; height: calc(100% + 10px); width: 6px; }

        button.reset {
            margin-top: 25px;
            background: var(--cell-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button.reset:hover { background: #30363d; }
    </style>
</head>
<body>

    <h1>DevOps Pipeline</h1>
    <p class="subtitle">Draw a continuous line through every square. Hit checkpoints 1 to 4 in order.</p>

    <div id="message" class="banner">Awaiting Pipeline...</div>

    <div class="grid-container">
        <div id="grid" class="grid"></div>
    </div>

    <button class="reset" onclick="initGame()">Reset Pipeline</button>

    <script>
        const gridEl = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const cols = 4, rows = 4;
        
        let path = [];
        let visited = new Set();
        let cells = {};
        let isGameOver = false;

        // Note: Production is at 3,2 to make the graph-theory puzzle logically solvable.
        const cellData = {
            "0,0": { label: "Source<br>Code", type: "start" },
            "3,0": { label: "[1] Unit<br>Test", type: "checkpoint" },
            "0,1": { label: "[2] Sec<br>Scan", type: "checkpoint" },
            "1,2": { label: "[3] Docker<br>Build", type: "checkpoint" },
            "3,3": { label: "[4] Staging", type: "checkpoint" },
            "3,2": { label: "Production", type: "end" }
        };

        const requiredCheckpoints = ["3,0", "0,1", "1,2", "3,3"];

        function initGame() {
            gridEl.innerHTML = '';
            cells = {};
            path = [];
            visited.clear();
            isGameOver = false;
            messageEl.className = "banner";
            messageEl.textContent = "Pipeline Running...";

            // Build grid
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const pos = `${x},${y}`;
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${x}-${y}`;
                    
                    if (cellData[pos]) {
                        cell.classList.add(cellData[pos].type);
                        cell.innerHTML = `<span>${cellData[pos].label}</span>`;
                    }

                    cell.addEventListener('click', () => tryMoveTo(x, y));
                    gridEl.appendChild(cell);
                    cells[pos] = cell;
                }
            }

            // Start position
            makeMove(0, 0, true);
        }

        function tryMoveTo(x, y) {
            if (isGameOver) return;
            const current = path[path.length - 1];
            const dx = Math.abs(x - current.x);
            const dy = Math.abs(y - current.y);
            const pos = `${x},${y}`;

            // Allow backtracking (Undo)
            if (path.length > 1) {
                const prev = path[path.length - 2];
                if (prev.x === x && prev.y === y) {
                    undoMove();
                    return;
                }
            }

            // Must be directly adjacent (no diagonals) and unvisited
            if ((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) {
                if (!visited.has(pos)) {
                    makeMove(x, y);
                }
            }
        }

        function makeMove(x, y, isFirst = false) {
            const pos = `${x},${y}`;
            const currentCell = cells[pos];

            if (!isFirst) {
                const prev = path[path.length - 1];
                const prevCell = cells[`${prev.x},${prev.y}`];
                
                // Draw connecting line in the previous cell pointing to the new cell
                const line = document.createElement('div');
                if (x > prev.x) line.className = 'line-right';
                else if (x < prev.x) line.className = 'line-left';
                else if (y > prev.y) line.className = 'line-down';
                else if (y < prev.y) line.className = 'line-up';
                prevCell.appendChild(line);
            }

            path.push({x, y});
            visited.add(pos);

            // Draw dot
            const dot = document.createElement('div');
            dot.className = 'dot';
            currentCell.appendChild(dot);

            updateCurrentHighlight();
            checkWinCondition(x, y);
        }

        function undoMove() {
            const last = path.pop();
            const pos = `${last.x},${last.y}`;
            visited.delete(pos);
            
            const cell = cells[pos];
            const dot = cell.querySelector('.dot');
            if(dot) dot.remove();

            const prev = path[path.length - 1];
            const prevCell = cells[`${prev.x},${prev.y}`];

            // Remove directional line from the new "current" cell
            const lines = prevCell.querySelectorAll('.line-right, .line-left, .line-up, .line-down');
            if (lines.length > 0) lines[lines.length - 1].remove();

            updateCurrentHighlight();
            
            // Clear fail states if user backtracks
            messageEl.className = "banner";
            messageEl.textContent = "Pipeline Running...";
            isGameOver = false; 
        }

        function updateCurrentHighlight() {
            Object.values(cells).forEach(c => c.classList.remove('current'));
            if (path.length > 0) {
                const current = path[path.length - 1];
                cells[`${current.x},${current.y}`].classList.add('current');
            }
        }

        function checkWinCondition(x, y) {
            if (x === 3 && y === 2) { // Reached Production
                isGameOver = true;
                
                if (path.length !== 16) {
                    messageEl.textContent = "Pipeline Failed: Code coverage not 100%.";
                    messageEl.className = "banner fail";
                    return;
                }

                let hitOrder = [];
                for (let p of path) {
                    const posStr = `${p.x},${p.y}`;
                    if (requiredCheckpoints.includes(posStr)) {
                        hitOrder.push(posStr);
                    }
                }

                const sequenceCorrect = JSON.stringify(hitOrder) === JSON.stringify(requiredCheckpoints);

                if (sequenceCorrect) {
                    messageEl.textContent = "Deployment Successful! 🚀";
                    messageEl.className = "banner success";
                } else {
                    messageEl.textContent = "Pipeline Failed: Incorrect checkpoint sequence.";
                    messageEl.className = "banner fail";
                }
            }
        }

        // --- Controls ---
        
        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if (isGameOver || path.length === 0) return;
            const current = path[path.length - 1];
            if (e.key === 'ArrowUp') tryMoveTo(current.x, current.y - 1);
            if (e.key === 'ArrowDown') tryMoveTo(current.x, current.y + 1);
            if (e.key === 'ArrowLeft') tryMoveTo(current.x - 1, current.y);
            if (e.key === 'ArrowRight') tryMoveTo(current.x + 1, current.y);
        });

        // Swipe Support for Mobile
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: true});

        document.addEventListener('touchend', e => {
            if (isGameOver || path.length === 0) return;
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            const current = path[path.length - 1];

            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
                if (dx > 0) tryMoveTo(current.x + 1, current.y); 
                else tryMoveTo(current.x - 1, current.y); 
            } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 30) {
                if (dy > 0) tryMoveTo(current.x, current.y + 1);
                else tryMoveTo(current.x, current.y - 1); 
            }
        }, {passive: true});

        // Start Game
        initGame();
    </script>
</body>
</html>
