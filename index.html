<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DevOps Rush V2</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
overflow:hidden;
}

#hud{
position:fixed;
top:0;
width:100%;
height:60px;
background:#020617;
display:flex;
justify-content:space-around;
align-items:center;
border-bottom:2px solid #334155;
z-index:10;
}

#game{
position:absolute;
top:60px;
bottom:0;
width:100%;
overflow:hidden;
}

.zone{
border:2px dashed #64748b;
border-radius:10px;
text-align:center;
padding:10px;
position:absolute;
}

.item{
background:#1e293b;
border-radius:8px;
padding:10px;
position:absolute;
cursor:pointer;
touch-action:none;
box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

.pipeline{
height:6px;
background:#334155;
position:absolute;
}

.green{
background:#065f46;
}

.red{
background:#7f1d1d;
}

.center{
text-align:center;
padding-top:120px;
}

button{
padding:12px 24px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

.levelup{
position:absolute;
top:100px;
left:50%;
transform:translateX(-50%);
font-size:28px;
color:#22c55e;
}

</style>
</head>

<body>

<div id="hud">
<div>Stage: <span id="stage"></span></div>
<div>Score: <span id="score"></span></div>
<div>Health: <span id="health"></span></div>
<div>Time: <span id="time"></span></div>
<div>Combo: <span id="combo"></span></div>
</div>

<div id="game"></div>

<script>

const GameState={
INIT:"INIT",
CI:"CI_PIPELINE",
DEPLOY:"DEPLOY",
INCIDENT:"INCIDENT",
END:"END"
}

let state=GameState.INIT
let score=0
let health=100
let timer=30
let combo=0

let drag=null
let game=document.getElementById("game")

function hud(){
stage.innerText=state
scoreEl.innerText=score
healthEl.innerText=health
timeEl.innerText=timer
comboEl.innerText=combo
}

const stage=document.getElementById("stage")
const scoreEl=document.getElementById("score")
const healthEl=document.getElementById("health")
const timeEl=document.getElementById("time")
const comboEl=document.getElementById("combo")

function clearGame(){
game.innerHTML=""
}

function startTimer(){

timer=30

let t=setInterval(()=>{

timer--
hud()

if(timer<=0){
clearInterval(t)
nextStage()
}

},1000)

}

function nextStage(){

combo=0

if(state===GameState.CI){
state=GameState.DEPLOY
deployGame()
return
}

if(state===GameState.DEPLOY){
state=GameState.INCIDENT
incidentGame()
return
}

if(state===GameState.INCIDENT){
state=GameState.END
endGame()
}

}

function intro(){

clearGame()

let div=document.createElement("div")
div.className="center"
div.innerHTML=`
<h1>🚀 DevOps Rush</h1>
<p>CI/CD Chaos Simulator</p>
<button onclick="start()">Start Game</button>
`

game.appendChild(div)

}

function start(){
score=0
health=100
state=GameState.CI
ciGame()
}

function ciGame(){

clearGame()
hud()
startTimer()

let pipeline=["Code","Build","Test","Docker","Artifact"]

pipeline.forEach((p,i)=>{

let z=document.createElement("div")
z.className="zone"
z.style.left=(i*18+5)+"%"
z.style.top="40%"
z.style.width="14%"
z.style.height="100px"
z.innerText=p
z.dataset.name=p
game.appendChild(z)

})

pipeline.sort(()=>Math.random()-0.5)

pipeline.forEach((p,i)=>{

let el=document.createElement("div")
el.className="item"
el.innerText=p
el.style.left=(Math.random()*500)+"px"
el.style.top=(100+Math.random()*200)+"px"
dragEnable(el)
game.appendChild(el)

})

}

function deployGame(){

clearGame()
hud()
startTimer()

let arch=["Internet","LoadBalancer","AppCluster","Database","Cache"]

arch.forEach((a,i)=>{

let z=document.createElement("div")
z.className="zone"
z.style.left="40%"
z.style.top=(80+i*90)+"px"
z.style.width="200px"
z.style.height="70px"
z.innerText=a
z.dataset.name=a
game.appendChild(z)

})

arch.sort(()=>Math.random()-0.5)

arch.forEach((a,i)=>{

let el=document.createElement("div")
el.className="item green"
el.innerText=a
el.style.left=(Math.random()*300)+"px"
el.style.top=(100+Math.random()*300)+"px"
dragEnable(el)
game.appendChild(el)

})

}

function incidentGame(){

clearGame()
hud()
startTimer()

spawnIncident()

setInterval(spawnIncident,3000)

}

function spawnIncident(){

if(state!==GameState.INCIDENT) return

let incidents=[
["CPU Spike","AutoScale"],
["Pod Crash","Restart"],
["Disk Full","Cleanup"],
["Latency","EnableCache"],
["Memory Leak","Redeploy"]
]

let i=incidents[Math.floor(Math.random()*incidents.length)]

let alert=document.createElement("div")
alert.className="item red"
alert.innerText=i[0]
alert.dataset.fix=i[1]
alert.style.left=(Math.random()*window.innerWidth)+"px"
alert.style.top=(100+Math.random()*200)+"px"

game.appendChild(alert)

let fix=document.createElement("div")
fix.className="item green"
fix.innerText=i[1]
fix.style.left=(Math.random()*window.innerWidth)+"px"
fix.style.top=(300+Math.random()*200)+"px"

dragEnable(fix)
game.appendChild(fix)

}

function dragEnable(el){

el.addEventListener("pointerdown",()=>drag=el)

window.addEventListener("pointermove",e=>{

if(!drag)return

drag.style.left=e.clientX-40+"px"
drag.style.top=e.clientY-20+"px"

})

window.addEventListener("pointerup",()=>{

if(!drag)return
dropCheck(drag)
drag=null

})

}

function dropCheck(el){

let zones=document.querySelectorAll(".zone")

zones.forEach(z=>{

let r=z.getBoundingClientRect()
let e=el.getBoundingClientRect()

if(e.left<r.right && e.right>r.left && e.top<r.bottom && e.bottom>r.top){

if(el.innerText===z.dataset.name){

combo++
score+=10*combo
el.remove()

}else{

combo=0
health-=10

}

hud()

}

})

let alerts=document.querySelectorAll(".red")

alerts.forEach(a=>{

let r=a.getBoundingClientRect()
let e=el.getBoundingClientRect()

if(e.left<r.right && e.right>r.left && e.top<r.bottom && e.bottom>r.top){

if(el.innerText===a.dataset.fix){

score+=20
combo++
a.remove()
el.remove()

}else{

health-=10
combo=0

}

hud()

}

})

}

function endGame(){

clearGame()

let div=document.createElement("div")
div.className="center"

div.innerHTML=`
<h1>🏆 Deployment Complete</h1>
<h2>Final Score: ${score}</h2>
<button onclick="start()">Play Again</button>
`

game.appendChild(div)

}

intro()

</script>

</body>
</html>
