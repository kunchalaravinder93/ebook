<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Dash: The Green Line</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --grid-color: #161b22;
            --text-color: #c9d1d9;
            --player-color: #2ea043; /* GitHub Green */
            --path-color: #3fb950;
            --checkpoint-color: #8957e5; /* GitHub Purple */
            --goal-color: #f85149; /* GitHub Red */
            --failed-color: #da3633;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: var(--path-color);
            margin-bottom: 0.5rem;
        }

        #subtitle {
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
            background-color: var(--grid-color);
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #30363d;
            position: relative;
        }

        .cell {
            background-color: var(--bg-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            text-align: center;
            text-transform: uppercase;
            color: #8b949e;
            position: relative;
        }

        .checkpoint {
            border: 2px solid var(--checkpoint-color);
            color: var(--checkpoint-color);
        }

        .start {
            border: 2px solid var(--player-color);
            color: var(--player-color);
        }

        .goal {
            border: 2px solid var(--goal-color);
            color: var(--goal-color);
        }

        .visited {
            background-color: rgba(63, 185, 80, 0.15); /* Faint Green */
        }

        #player {
            width: 80px;
            height: 80px;
            background-color: var(--player-color);
            border-radius: 50%;
            position: absolute;
            top: 10px; /* Start position A1 */
            left: 10px;
            transition: all 0.1s ease-in-out;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 0 10px var(--path-color);
        }

        #status {
            margin-top: 2rem;
            font-size: 1.2rem;
            text-align: center;
            width: 400px;
            height: 50px;
        }

        #reset-btn {
            margin-top: 1rem;
            padding: 10px 20px;
            background-color: var(--grid-color);
            color: var(--text-color);
            border: 2px solid #30363d;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }

        #reset-btn:hover {
            background-color: #21262d;
        }

        /* SVG Overlay for drawing the continuous line */
        #path-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        #path-line {
            fill: none;
            stroke: var(--path-color);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

    </style>
</head>
<body>

    <div id="game-container">
        <h1>DEVOPS DASH: The Green Line</h1>
        <div id="subtitle">Connect the pipeline. Miss no square. Hit checkpoints in order.</div>

        <div id="grid">
            <div class="cell start" id="cell-0-0">SOURCE<br>CODE</div>
            <div class="cell checkpoint" id="cell-1-0">[1] UNIT TEST</div>
            <div class="cell" id="cell-2-0">LOGS</div>
            <div class="cell" id="cell-3-0">CLEAN UP</div>

            <div class="cell" id="cell-0-1">LINT</div>
            <div class="cell" id="cell-1-1">BUILD LOGS</div>
            <div class="cell checkpoint" id="cell-2-1">[2] SECURITY</div>
            <div class="cell checkpoint" id="cell-3-1">[3] DOCKER BUILD</div>

            <div class="cell" id="cell-0-2">ARTIFACTS</div>
            <div class="cell" id="cell-1-2">SECRETS</div>
            <div class="cell" id="cell-2-2">IMAGE<br>PUSH</div>
            <div class="cell" id="cell-3-2">NETWORK<br>SCAN</div>

            <div class="cell" id="cell-0-3">CACHE</div>
            <div class="cell checkpoint" id="cell-1-3">[4] STAGING</div>
            <div class="cell" id="cell-2-3">COMPLIANCE</div>
            <div class="cell goal" id="cell-3-3">GOAL<br>PROD</div>

            <div id="player">Commit</div>
            <svg id="path-svg"><polyline id="path-line" points=""/></svg>
        </div>

        <div id="status">Use Arrow Keys to move.</div>
        <button id="reset-btn">Reset Pipeline</button>
    </div>

    <script>
        // --- GAME STATE ---
        const gridSize = 4;
        const totalSquares = gridSize * gridSize;
        const cellSize = 110; // 100px size + 10px gap
        
        let playerPos = { row: 0, col: 0 };
        let path = [{ row: 0, col: 0 }]; // Start with A1 (Code)
        let visited = new Set(['cell-0-0']);
        let nextCheckpoint = 1;
        let isGameOver = false;

        // Checkpoints to hit in order: [row, col]
        const checkpoints = [
            { row: 1, col: 0 }, // [1] UNIT TEST
            { row: 2, col: 1 }, // [2] SECURITY
            { row: 3, col: 1 }, // [3] DOCKER BUILD
            { row: 1, col: 3 }  // [4] STAGING
        ];

        const goalPos = { row: 3, col: 3 }; // PROD (End)

        // --- DOM ELEMENTS ---
        const player = document.getElementById('player');
        const grid = document.getElementById('grid');
        const status = document.getElementById('status');
        const resetBtn = document.getElementById('reset-btn');
        const pathLine = document.getElementById('path-line');

        // --- FUNCTIONS ---

        function updatePlayerDOM() {
            player.style.top = `${playerPos.row * cellSize + 10}px`;
            player.style.left = `${playerPos.col * cellSize + 10}px`;
            
            // Mark the cell as visited in the UI
            document.getElementById(`cell-${playerPos.row}-${playerPos.col}`).classList.add('visited');
            
            updatePathLine();
        }

        // Draws the continuous line on the SVG overlay
        function updatePathLine() {
            let pointsString = path.map(pos => 
                `${pos.col * cellSize + 60},${pos.row * cellSize + 60}`
            ).join(' ');
            pathLine.setAttribute('points', pointsString);
        }

        function handleMove(rowDiff, colDiff) {
            if (isGameOver) return;

            const newRow = playerPos.row + rowDiff;
            const newCol = playerPos.col + colDiff;

            // 1. BOUNDS CHECK: Is the move inside the 4x4 grid?
            if (newRow < 0 || newRow >= gridSize || newCol < 0 || newCol >= gridSize) {
                status.textContent = "Pipeline Error: Attempting to move out of infrastructure bounds.";
                return;
            }

            // 2. BACKTRACK CHECK: Did they try to move to the exact previous square?
            const cellId = `cell-${newRow}-${newCol}`;
            if (visited.has(cellId)) {
                // Check if they are backtracking to their previous step
                if (path.length > 1 && newRow === path[path.length-2].row && newCol === path[path.length-2].col) {
                    // This is valid backtracking
                    path.pop();
                    const lastVisitedCellId = `cell-${playerPos.row}-${playerPos.col}`;
                    document.getElementById(lastVisitedCellId).classList.remove('visited');
                    visited.delete(lastVisitedCellId);

                    // Did we backtrack over a checkpoint we already hit?
                    const checkpointId = `cell-${playerPos.row}-${playerPos.col}`;
                    const cpCell = document.getElementById(checkpointId);
                    if (cpCell.classList.contains('checkpoint') && nextCheckpoint > 1) {
                         // Reset the checkpoint counter
                         nextCheckpoint--;
                         status.textContent = `Backtracked. Awaiting Checkpoint [${nextCheckpoint}]...`;
                    }
                } else {
                    // Invalid move: crossed their own line
                    endGame("Pipeline Failed: Crossed existing path. Non-continuous DAGs are not supported.");
                    return;
                }
            } else {
                // Moving to a new square
                visited.add(cellId);
                path.push({ row: newRow, col: newCol });
            }

            playerPos.row = newRow;
            playerPos.col = newCol;
            updatePlayerDOM();

            // 3. CHECKPOINT & GOAL LOGIC
            const currentCell = document.getElementById(`cell-${newRow}-${newCol}`);

            // A. Did we hit a checkpoint?
            if (currentCell.classList.contains('checkpoint')) {
                // Did we hit it IN ORDER?
                if (checkpoints[nextCheckpoint - 1].row === newRow && checkpoints[nextCheckpoint - 1].col === newCol) {
                    status.innerHTML = `<span style="color:var(--checkpoint-color)">Checkpoint [${nextCheckpoint}] hit! OK.</span>`;
                    nextCheckpoint++;
                } else {
                    // Wait, did we miss a previous checkpoint?
                    if (path.filter(pos => pos.row === newRow && pos.col === newCol).length > 0) {
                        endGame(`Pipeline Failed: Awaiting Checkpoint [${nextCheckpoint}]. Reached Checkpoint ${currentCell.textContent} too early.`);
                        return;
                    }
                }
            }

            // B. Did we reach the Goal (PROD)?
            if (newRow === goalPos.row && newCol === goalPos.col) {
                // B.1 Did we hit ALL checkpoints?
                if (nextCheckpoint <= checkpoints.length) {
                    endGame("Pipeline Failed: Missed crucial security/testing checkpoints. Non-compliant build.", true);
                    return;
                }

                // B.2 Did we visit ALL squares (100% efficiency)?
                if (visited.size !== totalSquares) {
                    endGame("Pipeline Failed: Inefficient path. Did not pass through every optimization step.", true);
                    return;
                }

                // SUCCESS! 100% ZIP + DevOps Order
                endGame("SUCCESS! Pipeline deployed to PROD with 100% compliance and efficiency.", false, true);
            }
        }

        function endGame(message, failedAtGoal = false, success = false) {
            isGameOver = true;
            if (success) {
                status.innerHTML = `<span style="color:var(--path-color); font-weight:bold;">${message}</span>`;
                // Add special winning effect
                document.getElementById('grid').style.boxShadow = "0 0 30px var(--path-color)";
                return;
            }

            // Failure states
            status.innerHTML = `<span style="color:var(--failed-color); font-weight:bold;">${message}</span>`;
            if (failedAtGoal) {
                player.style.backgroundColor = var(--failed-color);
            }
        }

        function resetGame() {
            // Reset variables
            playerPos = { row: 0, col: 0 };
            path = [{ row: 0, col: 0 }];
            visited = new Set(['cell-0-0']);
            nextCheckpoint = 1;
            isGameOver = false;

            // Clear UI: remove 'visited' from all cells
            document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('visited'));
            
            // Initial UI update
            status.textContent = "Use Arrow Keys to move.";
            status.style.color = var(--text-color);
            document.getElementById('grid').style.boxShadow = "none";
            
            updatePlayerDOM();
        }

        // --- EVENT LISTENERS ---
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':    handleMove(-1, 0); break;
                case 'ArrowDown':  handleMove(1, 0); break;
                case 'ArrowLeft':  handleMove(0, -1); break;
                case 'ArrowRight': handleMove(0, 1); break;
            }
        });

        resetBtn.addEventListener('click', resetGame);

        // --- INITIAL SETUP ---
        updatePlayerDOM();

    </script>
</body>
</html>
