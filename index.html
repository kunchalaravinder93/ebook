<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevOps Pipeline Simulator PRO</title>
    <style>
        :root {
            --bg: #0d1117;
            --cell-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --green: #238636;
            --green-glow: #3fb950;
            --blue: #58a6ff;
            --purple: #bc8cff;
            --yellow: #d29922;
            --red: #f85149;
            --term-bg: #010409;
            --jira-bg: #fff;
            --grid-cols: 4;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }

        .header { width: 320px; margin-bottom: 12px; }
        .header h1 { margin: 0 0 5px 0; font-size: 1.4rem; color: #fff; }
        .meta-badges { display: flex; gap: 6px; }
        .badge { font-size: 0.65rem; font-weight: bold; padding: 3px 6px; border-radius: 4px; background: var(--cell-bg); border: 1px solid var(--border); color: #8b949e;}
        .badge.level { border-color: var(--blue); color: var(--blue); }
        .badge.concept { border-color: var(--purple); color: var(--purple); }
        
        .progress-container { width: 320px; height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: var(--blue); transition: width 0.1s linear; }

        .grid-container {
            background: #21262d; padding: 8px; border-radius: 8px;
            border: 1px solid var(--border); box-shadow: 0 8px 30px rgba(0,0,0,0.6); margin-bottom: 12px;
        }
        .grid { display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); gap: 8px; position: relative; }

        .cell {
            background: var(--cell-bg); border: 1px solid var(--border); border-radius: 4px;
            position: relative; display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 0.5rem; box-sizing: border-box;
            color: #8b949e; font-family: "Courier New", monospace;
        }

        .cell.start, .cell.end, .cell.checkpoint { border-width: 2px; font-weight: bold; color: var(--text); font-family: sans-serif;}
        .cell.start { border-color: var(--blue); color: var(--blue); }
        .cell.end { border-color: var(--purple); color: var(--purple); }
        .cell.checkpoint { border-color: var(--yellow); color: var(--yellow); }
        .cell.checkpoint.cleared { border-color: var(--green-glow); color: var(--green-glow); }
        .cell.bug { border-color: var(--red); color: var(--red); background: rgba(248, 81, 73, 0.1); border-width: 2px;}

        /* AI Linter Hint Animation */
        @keyframes pulseHint {
            0% { box-shadow: 0 0 0 0 rgba(188, 140, 255, 0.7); border-color: var(--purple); }
            70% { box-shadow: 0 0 0 12px rgba(188, 140, 255, 0); border-color: var(--purple); }
            100% { box-shadow: 0 0 0 0 rgba(188, 140, 255, 0); border-color: var(--border); }
        }
        @keyframes pulseError {
            0% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.7); border-color: var(--red); }
            70% { box-shadow: 0 0 0 12px rgba(248, 81, 73, 0); border-color: var(--red); }
            100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0); border-color: var(--border); }
        }
        .cell.hint-good { animation: pulseHint 1.5s infinite; z-index: 4; }
        .cell.hint-bad { animation: pulseError 1s infinite; z-index: 4; }

        .cell span { z-index: 3; pointer-events: none; background: rgba(13, 17, 23, 0.9); padding: 2px 4px; border-radius: 2px; line-height: 1.1; }

        .dot { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: var(--green); border-radius: 50%; transform: translate(-50%, -50%); z-index: 2; opacity: 0.7;}
        .cell.current .dot { width: 16px; height: 16px; background: var(--green-glow); box-shadow: 0 0 15px var(--green-glow); opacity: 1;}
        .cell.visited:not(.checkpoint):not(.start):not(.end):not(.bug) { color: var(--green-glow); border-color: rgba(63, 185, 80, 0.3); }

        .line { position: absolute; background: var(--green); z-index: 1; opacity: 0.7;}
        .line-right { top: calc(50% - 3px); left: 50%; width: calc(100% + 8px); height: 6px; }
        .line-left { top: calc(50% - 3px); right: 50%; width: calc(100% + 8px); height: 6px; }
        .line-down { left: calc(50% - 3px); top: 50%; height: calc(100% + 8px); width: 6px; }
        .line-up { left: calc(50% - 3px); bottom: 50%; height: calc(100% + 8px); width: 6px; }

        .terminal {
            width: 320px; height: 95px; background: var(--term-bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; box-sizing: border-box;
            font-family: "Courier New", monospace; font-size: 0.65rem; color: #8b949e; overflow-y: auto; text-align: left;
            display: flex; flex-direction: column; box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .log-line { margin: 1px 0; line-height: 1.2;}
        .log-sys { color: var(--blue); }
        .log-success { color: var(--green-glow); font-weight: bold; }
        .log-err { color: var(--red); font-weight: bold; }
        .log-warn { color: var(--yellow); }
        .log-ai { color: var(--purple); font-style: italic; }

        .controls { display: flex; gap: 8px; margin-top: 10px; width: 320px; }
        button.btn { flex: 1; background: transparent; color: var(--text); border: 1px solid var(--border); padding: 10px 0; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        button.btn:hover { background: #30363d; }
        button.btn.primary { background: rgba(188, 140, 255, 0.15); border-color: var(--purple); color: #e1d1ff; }
        button.btn.primary:hover { background: rgba(188, 140, 255, 0.3); }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(1, 4, 9, 0.9); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(3px); }
        .jira-ticket { background: var(--jira-bg); color: #172b4d; border-radius: 3px; padding: 20px; max-width: 400px; width: 100%; box-shadow: 0 10px 20px rgba(0,0,0,0.5); font-family: -apple-system, sans-serif; user-select: text;}
        .jira-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #dfe1e6; padding-bottom: 10px; margin-bottom: 15px;}
        .jira-key { font-weight: bold; color: #5e6c84; font-size: 0.9rem;}
        .jira-status { background: #deebff; color: #0052cc; font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 3px; text-transform: uppercase;}
        .jira-ticket h2 { margin: 0 0 15px 0; font-size: 1.3rem; color: #172b4d;}
        .jira-ticket h3 { font-size: 0.85rem; color: #5e6c84; text-transform: uppercase; margin: 15px 0 5px 0;}
        .jira-ticket p, .jira-ticket li { font-size: 0.9rem; line-height: 1.5; margin: 0 0 10px 0;}
        button.btn-jira { background: #0052cc; color: #fff; border: none; padding: 10px 20px; border-radius: 3px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px;}
        
        .report-content { background: var(--cell-bg); border: 1px solid var(--border); border-radius: 8px; padding: 25px; max-width: 450px; width: 100%; max-height: 85vh; overflow-y: auto;}
        .report-content h2 { color: var(--green-glow); margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        .report-content h3 { color: var(--blue); font-size: 1rem; margin-bottom: 5px; }
        .report-content p, .report-content li { font-size: 0.85rem; line-height: 1.6; }
        button.btn-rpt { background: var(--green); color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold;}
    </style>
</head>
<body>

    <div class="header">
        <h1>Pipeline Simulator</h1>
        <div class="meta-badges">
            <span class="badge level" id="badge-level">Lvl 1</span>
            <span class="badge concept" id="badge-concept">Concept</span>
        </div>
    </div>

    <div class="progress-container"><div id="progress" class="progress-bar"></div></div>
    <div class="grid-container" id="grid-container"><div id="grid" class="grid"></div></div>
    <div class="terminal" id="terminal"></div>

    <div class="controls">
        <button class="btn" onclick="startLevelBriefing()">Restart Mission</button>
        <button class="btn primary" onclick="runLinter()">🤖 AI Linter</button>
    </div>

    <div class="modal-overlay" id="briefing-modal"><div class="jira-ticket" id="jira-content"></div></div>
    <div class="modal-overlay" id="report-modal"><div class="report-content" id="report-body"></div></div>

    <script>
        const genericCodeFiles = [ "auth.js", "user.go", "config.yml", "index.html", "db.php", "api.py", "readme.md" ];

        // --- LEVEL CONFIGURATIONS WITH EXACT MATHEMATICAL SOLUTIONS ---
        const levels = [
            {
                cols: 4, rows: 4, bugCount: 1,
                concept: "Continuous Deployment",
                endPos: {x: 3, y: 3},
                checkpoints: ["2,0", "1,1", "0,3", "3,2"],
                names: ["[1] SAST", "[2] Unit Tests", "[3] Docker Build", "[4] Vuln Scan"],
                // This path avoids the bug at 1,2 perfectly and hits all other 15 squares.
                solution: ["0,0", "1,0", "2,0", "3,0", "3,1", "2,1", "1,1", "0,1", "0,2", "0,3", "1,3", "2,3", "2,2", "3,2", "3,3"],
                data: {
                    "0,0": { label: "git push", type: "start" },
                    "1,2": { label: "Log4j<br>Vuln", type: "bug" }, // The obstacle
                    "2,0": { label: "[1] SAST", type: "checkpoint" },
                    "1,1": { label: "[2] Test", type: "checkpoint" },
                    "0,3": { label: "[3] Build", type: "checkpoint" },
                    "3,2": { label: "[4] Scan", type: "checkpoint" },
                    "3,3": { label: "Deploy", type: "end" }
                },
                logs: {
                    "2,0": "[INFO] sonarqube-scanner... 0 Security Hotspots found.",
                    "1,1": "[PASS] 112 unit tests executed successfully in 1.2s.",
                    "0,3": "[DOCKER] step 3/5: COPY . /app ...",
                    "3,2": "[SCAN] Trivy analysis: Passed.",
                    "1,2": "[FATAL] Log4j RCE vulnerability detected! Pipeline Halted.",
                    "default": "> Code component validated."
                },
                briefing: {
                    key: "PROJ-101", title: "Automated CD & Security",
                    desc: "Automate the deployment pipeline. Security Gates must be enforced in order.",
                    reqs: [
                        "Integrate all <strong>15 safe code modules</strong>.",
                        "Pass Gates 1 thru 4 in order.",
                        "Path around the known <strong>Log4j Vulnerability</strong> (red tile)."
                    ]
                },
                report: {
                    title: "Deployment Successful",
                    desc: "You established a Continuous Deployment pipeline while successfully filtering out vulnerable code from the build context."
                }
            },
            {
                cols: 5, rows: 5, bugCount: 1,
                concept: "Blue/Green Deployment",
                endPos: {x: 1, y: 2}, 
                checkpoints: ["4,0", "0,4", "3,1", "2,3"],
                names: ["[1] Build Image", "[2] Deploy Green", "[3] E2E Tests", "[4] Switch Router"],
                // Beautiful inward spiral that perfectly dodges the bug at 2,2!
                solution: ["0,0", "1,0", "2,0", "3,0", "4,0", "4,1", "4,2", "4,3", "4,4", "3,4", "2,4", "1,4", "0,4", "0,3", "0,2", "0,1", "1,1", "2,1", "3,1", "3,2", "3,3", "2,3", "1,3", "1,2"],
                data: {
                    "0,0": { label: "Merge<br>Main", type: "start" },
                    "2,2": { label: "Deprecated<br>API", type: "bug" }, // Dead center obstacle
                    "4,0": { label: "[1] Build<br>Image", type: "checkpoint" },
                    "0,4": { label: "[2] Deploy<br>Green", type: "checkpoint" },
                    "3,1": { label: "[3] E2E<br>Tests", type: "checkpoint" },
                    "2,3": { label: "[4] Switch<br>Router", type: "checkpoint" },
                    "1,2": { label: "Live<br>Traffic", type: "end" }
                },
                logs: {
                    "4,0": "[DOCKER] pushing image backend:v2.1 to registry...",
                    "0,4": "[K8s] creating isolated green-environment...",
                    "3,1": "[TEST] running cypress tests... 100% Pass.",
                    "2,3": "[NGINX] reloading config... traffic routed to Green.",
                    "2,2": "[COMPILE ERROR] use of deprecated API v1.beta. Build failed.",
                    "default": "> Integrating service module."
                },
                briefing: {
                    key: "PROJ-202", title: "Zero-Downtime Rollout",
                    desc: "Upgrade the core API to v2 using an inward spiral architecture.",
                    reqs: [
                        "Integrate all <strong>24 safe services</strong>.",
                        "Spin up Green, run tests, THEN switch router.",
                        "Do not compile the <strong>Deprecated API</strong> tile."
                    ]
                },
                report: {
                    title: "Blue/Green Rollout Complete",
                    desc: "The old environment stayed live while you spiraled inwards, prepared the new environment, and executed an instant cutover."
                }
            }
        ];

        let currentLevel = 0, path = [], visited = new Set(), cells = {}, isGameOver = false, isDragging = false, clearedCheckpoints = [], levelData;
        const gridEl = document.getElementById('grid'), terminalEl = document.getElementById('terminal'), progressEl = document.getElementById('progress'), modals = { briefing: document.getElementById('briefing-modal'), report: document.getElementById('report-modal') };

        function startLevelBriefing() {
            levelData = levels[currentLevel];
            isGameOver = true;
            document.getElementById('badge-level').innerText = `Lvl ${currentLevel + 1}`;
            document.getElementById('badge-concept').innerText = levelData.concept;
            document.documentElement.style.setProperty('--grid-cols', levelData.cols);

            let reqsHtml = ""; levelData.briefing.reqs.forEach(r => reqsHtml += `<li>${r}</li>`);
            document.getElementById('jira-content').innerHTML = `
                <div class="jira-header"><span class="jira-key">${levelData.briefing.key}</span><span class="jira-status">To Do</span></div>
                <h2>${levelData.briefing.title}</h2><p>${levelData.briefing.desc}</p>
                <h3>Requirements</h3><ul>${reqsHtml}</ul>
                <button class="btn-jira" onclick="initLevel()">Start Pipeline</button>
            `;
            closeAllModals(); modals.briefing.style.display = 'flex';
        }

        function initLevel() {
            levelData = levels[currentLevel]; closeAllModals();
            gridEl.innerHTML = ''; terminalEl.innerHTML = ''; cells = {}; path = []; visited.clear(); clearedCheckpoints = []; isGameOver = false; 
            const cellSize = levelData.cols === 5 ? '56px' : '70px'; let fileIndex = 0;

            for (let y = 0; y < levelData.rows; y++) {
                for (let x = 0; x < levelData.cols; x++) {
                    const pos = `${x},${y}`; const cell = document.createElement('div');
                    cell.className = 'cell'; cell.style.width = cellSize; cell.style.height = cellSize; cell.id = `cell-${x}-${y}`;
                    if (levelData.data[pos]) {
                        cell.classList.add(levelData.data[pos].type); cell.innerHTML = `<span>${levelData.data[pos].label}</span>`;
                    } else {
                        cell.innerHTML = `<span>${genericCodeFiles[fileIndex++ % genericCodeFiles.length]}</span>`;
                    }
                    gridEl.appendChild(cell); cells[pos] = cell;
                }
            }
            logMsg(`[SYS] Initializing... Requires 100% safe code coverage.`, "log-sys");
            updateProgress(); makeMove(0, 0, true);
        }

        // --- NEW AI LINTER / HINT SYSTEM ---
        function runLinter() {
            if (isGameOver) return;
            Object.values(cells).forEach(c => { c.classList.remove('hint-good'); c.classList.remove('hint-bad'); });
            
            // Check if current path matches solution exactly
            let onTrack = true;
            for(let i=0; i<path.length; i++) {
                if(`${path[i].x},${path[i].y}` !== levelData.solution[i]) { onTrack = false; break; }
            }
            
            if(onTrack) {
                if(path.length < levelData.solution.length) {
                    const nextPos = levelData.solution[path.length];
                    cells[nextPos].classList.add('hint-good');
                    logMsg(`🤖 [AI Copilot] Route suggested to maintain 100% coverage.`, "log-ai");
                }
            } else {
                const currentPos = `${path[path.length-1].x},${path[path.length-1].y}`;
                cells[currentPos].classList.add('hint-bad');
                logMsg(`🤖 [AI Copilot] Linter Warning: Pipeline drift detected. You will miss code files. Drag backwards to undo.`, "log-err");
            }
        }

        function triggerHaptic(type) { if (navigator.vibrate) navigator.vibrate({tick:10, success:[30,50,30], error:[50,50,50,50]}[type]); }
        function logMsg(msg, className = "") {
            const line = document.createElement('div'); line.className = `log-line ${className}`;
            line.innerText = msg.startsWith('>') || msg.startsWith('🤖') ? msg : `> ${msg}`;
            terminalEl.appendChild(line); terminalEl.scrollTop = terminalEl.scrollHeight;
        }

        function updateProgress() {
            const requiredNodes = (levelData.cols * levelData.rows) - levelData.bugCount;
            const pct = (path.length / requiredNodes) * 100;
            progressEl.style.width = `${pct}%`;
            if (isGameOver) return;
            progressEl.style.backgroundColor = ["var(--blue)", "var(--yellow)", "var(--green-glow)"][pct < 40 ? 0 : (pct < 80 ? 1 : 2)];
        }

        gridEl.addEventListener('mousedown', (e) => { if(!isGameOver) { isDragging = true; processInput(e); }});
        window.addEventListener('mousemove', (e) => { if(isDragging && !isGameOver) { e.preventDefault(); processInput(e); } }, {passive: false});
        window.addEventListener('mouseup', () => isDragging = false);
        gridEl.addEventListener('touchstart', (e) => { if(!isGameOver) { isDragging = true; processInput(e); }}, {passive: false});
        gridEl.addEventListener('touchmove', (e) => { if(isDragging && !isGameOver) { e.preventDefault(); processInput(e); } }, {passive: false});
        window.addEventListener('touchend', () => isDragging = false);

        function processInput(e) {
            let clientX = e.clientX, clientY = e.clientY;
            if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            const rect = gridEl.getBoundingClientRect();
            if (clientX < rect.left || clientX > rect.right || clientY < rect.top || clientY > rect.bottom) return;
            const x = Math.floor((clientX - rect.left) / (rect.width / levelData.cols)), y = Math.floor((clientY - rect.top) / (rect.height / levelData.rows));
            if (x >= 0 && x < levelData.cols && y >= 0 && y < levelData.rows) tryMoveTo(x, y);
        }

        function tryMoveTo(x, y) {
            if (path.length === 0) return;
            const current = path[path.length - 1], pos = `${x},${y}`;
            if (current.x === x && current.y === y) return;
            if (path.length > 1) { const prev = path[path.length - 2]; if (prev.x === x && prev.y === y) { undoMove(); return; } }
            if ((Math.abs(x - current.x) === 1 && y === current.y) || (x === current.x && Math.abs(y - current.y) === 1)) {
                if (!visited.has(pos)) makeMove(x, y);
            }
        }

        function makeMove(x, y, isFirst = false) {
            Object.values(cells).forEach(c => { c.classList.remove('hint-good'); c.classList.remove('hint-bad'); }); // clear hints
            const pos = `${x},${y}`; const currentCell = cells[pos];
            path.push({x, y}); visited.add(pos); currentCell.classList.add('visited');

            if (!isFirst) {
                const prevCoord = path[path.length - 2], prevCell = cells[`${prevCoord.x},${prevCoord.y}`];
                const line = document.createElement('div'); line.className = 'line';
                if (x > prevCoord.x) line.classList.add('line-right'); else if (x < prevCoord.x) line.classList.add('line-left');
                else if (y > prevCoord.y) line.classList.add('line-down'); else if (y < prevCoord.y) line.classList.add('line-up');
                prevCell.appendChild(line); triggerHaptic('tick');
            }

            const dot = document.createElement('div'); dot.className = 'dot'; currentCell.appendChild(dot);
            
            const cellMeta = levelData.data[pos];
            const logStr = (levelData.logs[pos]) ? levelData.logs[pos] : (cellMeta && cellMeta.type === 'start' ? "Commit detected. Initiating..." : "Code integrity check passed.");
            logMsg(logStr, levelData.logs[pos] ? "" : "log-code");

            if (cellMeta && cellMeta.type === 'bug') {
                logMsg(`🛑 PIPELINE CRASHED.`, "log-err");
                progressEl.style.backgroundColor = "var(--red)"; isGameOver = true; isDragging = false; triggerHaptic('error'); return;
            }

            if (cellMeta && cellMeta.type === 'checkpoint') {
                clearedCheckpoints.push(pos); currentCell.classList.add('cleared'); triggerHaptic('success');
                logMsg(`>> Security Gate cleared: ${levelData.names[levelData.checkpoints.indexOf(pos)]}`, "log-warn");
            }

            updateCurrentHighlight(); updateProgress(); checkWinCondition(x, y);
        }

        function undoMove() {
            Object.values(cells).forEach(c => { c.classList.remove('hint-good'); c.classList.remove('hint-bad'); });
            const last = path.pop(), pos = `${last.x},${last.y}`; visited.delete(pos); cells[pos].classList.remove('visited');
            const dot = cells[pos].querySelector('.dot'); if(dot) dot.remove();
            if (levelData.data[pos] && levelData.data[pos].type === 'checkpoint') { cells[pos].classList.remove('cleared'); clearedCheckpoints.pop(); }
            const prevCell = cells[`${path[path.length - 1].x},${path[path.length - 1].y}`];
            const lines = prevCell.querySelectorAll('.line'); if (lines.length > 0) lines[lines.length - 1].remove();
            triggerHaptic('tick'); updateCurrentHighlight(); updateProgress();
        }

        function updateCurrentHighlight() {
            Object.values(cells).forEach(c => c.classList.remove('current'));
            if (path.length > 0) cells[`${path[path.length - 1].x},${path[path.length - 1].y}`].classList.add('current');
        }

        function checkWinCondition(x, y) {
            if (x === levelData.endPos.x && y === levelData.endPos.y) { 
                isGameOver = true; isDragging = false;
                const requiredNodes = (levelData.cols * levelData.rows) - levelData.bugCount;
                if (path.length !== requiredNodes) {
                    progressEl.style.backgroundColor = "var(--red)";
                    logMsg("FATAL: Orphaned source code detected.", "log-err"); triggerHaptic('error'); return;
                }
                if (JSON.stringify(clearedCheckpoints) === JSON.stringify(levelData.checkpoints)) {
                    progressEl.style.backgroundColor = "var(--green-glow)";
                    logMsg("DEPLOYMENT SUCCESSFUL.", "log-success"); triggerHaptic('success'); showReport();
                } else {
                    progressEl.style.backgroundColor = "var(--red)";
                    logMsg("FATAL: Security Gates Bypassed.", "log-err"); triggerHaptic('error');
                }
            }
        }

        function showReport() {
            document.getElementById('report-body').innerHTML = `
                <h2>✅ Post-Action Report</h2><h3>${levelData.report.title}</h3><p>${levelData.report.desc}</p>
                ${currentLevel === levels.length - 1 ? `<button class="btn-rpt" onclick="closeAllModals()">Simulator Complete</button>` : `<button class="btn-rpt" onclick="nextLevel()">Start Level ${currentLevel + 2}</button>`}
            `;
            setTimeout(() => { modals.report.style.display = 'flex'; }, 800);
        }
        function nextLevel() { currentLevel++; startLevelBriefing(); }
        function closeAllModals() { modals.briefing.style.display = 'none'; modals.report.style.display = 'none'; }
        
        startLevelBriefing();
    </script>
</body>
</html>
