<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Section 4: Architecture Subjective Task</title>
    <style>
        :root {
            --bg: #0d1117; --cell-bg: #161b22; --border: #30363d; --text: #c9d1d9;
            --green: #238636; --green-glow: #3fb950; --blue: #58a6ff; --purple: #bc8cff;
            --yellow: #d29922; --red: #f85149; --term-bg: #010409; --interview-bg: #f6f8fa;
            --grid-cols: 4;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }

        .header { width: 320px; margin-bottom: 12px; }
        .header h1 { margin: 0 0 5px 0; font-size: 1.3rem; color: #fff; }
        .meta-badges { display: flex; gap: 6px; justify-content: space-between; align-items: center;}
        .badge { font-size: 0.65rem; font-weight: bold; padding: 3px 6px; border-radius: 4px; background: var(--cell-bg); border: 1px solid var(--border); color: #8b949e;}
        .badge.level { border-color: var(--blue); color: var(--blue); }
        
        /* The New Budget Meter */
        .budget-display { font-family: monospace; font-size: 1.1rem; color: var(--green-glow); font-weight: bold; background: #010409; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border);}
        .budget-display.warning { color: var(--yellow); }
        .budget-display.danger { color: var(--red); animation: shake 0.5s infinite; }

        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } 100% { transform: translateX(0); } }

        .progress-container { width: 320px; height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: var(--green); transition: width 0.1s linear, background-color 0.2s; }

        .grid-container {
            background: #21262d; padding: 8px; border-radius: 8px;
            border: 1px solid var(--border); box-shadow: 0 8px 30px rgba(0,0,0,0.6); margin-bottom: 12px;
        }
        .grid { display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); gap: 8px; position: relative; }

        .cell {
            background: var(--cell-bg); border: 1px dashed #484f58; border-radius: 4px;
            position: relative; display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 0.5rem; box-sizing: border-box;
            color: #484f58; font-family: "Courier New", monospace;
        }

        .cell.start, .cell.end, .cell.checkpoint { border: 2px solid; font-weight: bold; color: var(--text); font-family: sans-serif;}
        .cell.start { border-color: var(--blue); color: var(--blue); background: rgba(88, 166, 255, 0.1);}
        .cell.end { border-color: var(--purple); color: var(--purple); background: rgba(188, 140, 255, 0.1);}
        .cell.checkpoint { border-color: var(--yellow); color: var(--yellow); }
        .cell.checkpoint.cleared { border-color: var(--green-glow); color: var(--green-glow); background: rgba(63, 185, 80, 0.1);}
        .cell.bug { border-color: var(--red); color: var(--red); background: rgba(248, 81, 73, 0.1); border-width: 2px; border-style: solid;}

        .cell span { z-index: 3; pointer-events: none; background: rgba(13, 17, 23, 0.9); padding: 2px 4px; border-radius: 2px; line-height: 1.1; }

        .dot { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: var(--blue); border-radius: 50%; transform: translate(-50%, -50%); z-index: 2;}
        .cell.current .dot { width: 16px; height: 16px; background: var(--blue); box-shadow: 0 0 15px var(--blue);}
        .cell.visited:not(.checkpoint):not(.start):not(.end):not(.bug) { color: var(--blue); border-style: solid; border-color: rgba(88, 166, 255, 0.4); }

        .line { position: absolute; background: var(--blue); z-index: 1;}
        .line-right { top: calc(50% - 3px); left: 50%; width: calc(100% + 8px); height: 6px; }
        .line-left { top: calc(50% - 3px); right: 50%; width: calc(100% + 8px); height: 6px; }
        .line-down { left: calc(50% - 3px); top: 50%; height: calc(100% + 8px); width: 6px; }
        .line-up { left: calc(50% - 3px); bottom: 50%; height: calc(100% + 8px); width: 6px; }

        .terminal {
            width: 320px; height: 95px; background: var(--term-bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; box-sizing: border-box;
            font-family: "Courier New", monospace; font-size: 0.65rem; color: #8b949e; overflow-y: auto; text-align: left;
            display: flex; flex-direction: column; box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .log-line { margin: 1px 0; line-height: 1.2;}
        .log-sys { color: var(--blue); }
        .log-success { color: var(--green-glow); font-weight: bold; }
        .log-err { color: var(--red); font-weight: bold; }
        .log-warn { color: var(--yellow); }
        .log-cost { color: #8b949e; font-style: italic; }

        .controls { display: flex; gap: 8px; margin-top: 10px; width: 320px; }
        button.btn { flex: 1; background: transparent; color: var(--text); border: 1px solid var(--border); padding: 10px 0; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        button.btn:hover { background: #30363d; }
        button.btn.primary { background: #0052cc; border: none; color: #fff; }
        button.btn.primary:hover { background: #0043a6; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(1, 4, 9, 0.9); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(3px); }
        .interview-card { background: var(--interview-bg); color: #24292f; border-radius: 6px; padding: 25px; max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-family: -apple-system, sans-serif; user-select: text;}
        .interview-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d0d7de; padding-bottom: 10px; margin-bottom: 15px;}
        .interview-title { font-weight: bold; color: #0969da; font-size: 1rem;}
        .interview-role { background: #ddf4ff; color: #0969da; font-size: 0.7rem; font-weight: bold; padding: 4px 8px; border-radius: 12px; text-transform: uppercase;}
        .interview-card h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #24292f;}
        .interview-card .quote { border-left: 4px solid #0969da; padding-left: 15px; color: #57606a; font-style: italic; margin-bottom: 20px;}
        .interview-card h3 { font-size: 0.85rem; color: #57606a; text-transform: uppercase; margin: 15px 0 5px 0;}
        .interview-card ul { padding-left: 20px; margin: 0;}
        .interview-card li { font-size: 0.9rem; line-height: 1.5; margin: 0 0 8px 0; color: #24292f;}
        button.btn-start { background: #2da44e; color: #fff; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; font-size: 1rem;}
        
        .report-content { background: var(--cell-bg); border: 1px solid var(--border); border-radius: 8px; padding: 25px; max-width: 450px; width: 100%; max-height: 85vh; overflow-y: auto;}
        .report-content h2 { color: var(--green-glow); margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        .report-content h3 { color: var(--blue); font-size: 1rem; margin-bottom: 5px; }
        .report-content p, .report-content li { font-size: 0.85rem; line-height: 1.6; }
        button.btn-rpt { background: var(--green); color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold;}
    </style>
</head>
<body>

    <div class="header">
        <h1>Subjective Task</h1>
        <div class="meta-badges">
            <span class="badge level" id="badge-level">Section 4</span>
            <span class="budget-display" id="budget-display">Cost: $0 / $400</span>
        </div>
    </div>

    <div class="progress-container"><div id="progress" class="progress-bar"></div></div>
    <div class="grid-container" id="grid-container"><div id="grid" class="grid"></div></div>
    <div class="terminal" id="terminal"></div>

    <div class="controls">
        <button class="btn" onclick="startLevelBriefing()">Read Requirements</button>
        <button class="btn primary" onclick="submitArchitecture()">Submit Architecture</button>
    </div>

    <div class="modal-overlay" id="briefing-modal"><div class="interview-card" id="interview-content"></div></div>
    <div class="modal-overlay" id="report-modal"><div class="report-content" id="report-body"></div></div>

    <script>
        // No more generic code files. Empty space is just empty space (networking).
        const genericNodes = [ "Subnet", "VPC<br>Route", "Data<br>Transfer", "Hop" ];

        const levels = [
            {
                cols: 4, rows: 4, 
                maxBudget: 450, // Player fails if cost exceeds this
                baseCost: 50,   // Cost per standard empty tile crossed
                concept: "AWS High Availability",
                endPos: {x: 3, y: 3},
                checkpoints: ["1,0", "2,1", "1,2"],
                names: ["[1] WAF", "[2] ALB", "[3] Auto Scaling"],
                data: {
                    "0,0": { label: "Internet<br>Traffic", type: "start" },
                    "1,0": { label: "[1] AWS<br>WAF", type: "checkpoint" },
                    "2,1": { label: "[2] App Load<br>Balancer", type: "checkpoint" },
                    "1,2": { label: "[3] Auto<br>Scaling", type: "checkpoint" },
                    "3,3": { label: "Multi-AZ<br>RDS", type: "end" },
                    
                    "0,2": { label: "Public<br>EC2", type: "bug" }, // Bad architecture
                    "3,0": { label: "NAT<br>Gateway", type: "bug" }  // Expensive/wrong tool for inbound
                },
                logs: {
                    "1,0": "[Architecture] WAF attached. Malicious traffic filtered.",
                    "2,1": "[Architecture] ALB Provisioned. Traffic distributing across AZs.",
                    "1,2": "[Architecture] ASG attached to Target Group. Compute will scale.",
                    "0,2": "[Security Fault] You routed directly to a Public EC2 instance! Failed.",
                    "3,0": "[Cost Fault] NAT Gateway is for outbound traffic. You wasted $32/mo. Failed.",
                    "default": "> Network route created... +$50 Data Transfer Cost."
                },
                briefing: {
                    role: "Architect", title: "Scenario: Secure Web App",
                    quote: "Design a secure, highly available path from the public internet to our secure database. Do not overspend.",
                    reqs: [
                        "<strong>Route efficiently.</strong> Do NOT fill the whole board. Every empty square you cross costs $50 in data transfer.",
                        "Filter traffic with a WAF, balance it with an ALB, and ensure the compute layer scales (ASG).",
                        "Avoid exposing instances directly to the internet (Public EC2)."
                    ]
                },
                report: {
                    title: "Architecture Approved",
                    desc: "You successfully designed a direct, secure, and cost-effective AWS architecture. You avoided the bloated costs of meandering network routes and skipped the anti-patterns."
                }
            }
        ];

        let currentLevel = 0, path = [], visited = new Set(), cells = {}, isGameOver = false, isDragging = false, clearedCheckpoints = [], levelData;
        let currentCost = 0;
        const gridEl = document.getElementById('grid'), terminalEl = document.getElementById('terminal'), progressEl = document.getElementById('progress'), budgetDisplay = document.getElementById('budget-display'), modals = { briefing: document.getElementById('briefing-modal'), report: document.getElementById('report-modal') };

        function startLevelBriefing() {
            levelData = levels[currentLevel];
            isGameOver = true;
            
            let reqsHtml = ""; levelData.briefing.reqs.forEach(r => reqsHtml += `<li>${r}</li>`);
            document.getElementById('interview-content').innerHTML = `
                <div class="interview-header"><span class="interview-title">${levelData.briefing.title}</span><span class="interview-role">${levelData.briefing.role}</span></div>
                <div class="quote">"${levelData.briefing.quote}"</div>
                <h3>Whiteboard Requirements</h3><ul>${reqsHtml}</ul>
                <button class="btn-start" onclick="initLevel()">Start Whiteboarding</button>
            `;
            closeAllModals(); modals.briefing.style.display = 'flex';
        }

        function initLevel() {
            levelData = levels[currentLevel]; closeAllModals();
            gridEl.innerHTML = ''; terminalEl.innerHTML = ''; cells = {}; path = []; visited.clear(); clearedCheckpoints = []; isGameOver = false; 
            currentCost = 0; updateCostDisplay();
            
            const cellSize = levelData.cols === 5 ? '56px' : '70px'; let fileIndex = 0;

            for (let y = 0; y < levelData.rows; y++) {
                for (let x = 0; x < levelData.cols; x++) {
                    const pos = `${x},${y}`; const cell = document.createElement('div');
                    cell.className = 'cell'; cell.style.width = cellSize; cell.style.height = cellSize; cell.id = `cell-${x}-${y}`;
                    if (levelData.data[pos]) {
                        cell.classList.add(levelData.data[pos].type); cell.innerHTML = `<span>${levelData.data[pos].label}</span>`;
                    } else {
                        cell.innerHTML = `<span>${genericNodes[fileIndex++ % genericNodes.length]}</span>`;
                    }
                    gridEl.appendChild(cell); cells[pos] = cell;
                }
            }
            logMsg(`[Interviewer] Let's see your architectural design. Keep costs under $${levelData.maxBudget}.`, "log-sys");
            makeMove(0, 0, true);
        }

        function triggerHaptic(type) { if (navigator.vibrate) navigator.vibrate({tick:10, success:[30,50,30], error:[50,50,50,50]}[type]); }
        
        function logMsg(msg, className = "") {
            const line = document.createElement('div'); line.className = `log-line ${className}`;
            line.innerText = msg; terminalEl.appendChild(line); terminalEl.scrollTop = terminalEl.scrollHeight;
        }

        function updateCostDisplay() {
            budgetDisplay.innerText = `Cost: $${currentCost} / $${levelData.maxBudget}`;
            const pct = (currentCost / levelData.maxBudget) * 100;
            progressEl.style.width = `${Math.min(pct, 100)}%`;
            
            budgetDisplay.className = "budget-display";
            progressEl.style.backgroundColor = "var(--green)";
            
            if (pct >= 100) {
                budgetDisplay.classList.add('danger');
                progressEl.style.backgroundColor = "var(--red)";
            } else if (pct >= 75) {
                budgetDisplay.classList.add('warning');
                progressEl.style.backgroundColor = "var(--yellow)";
            }
        }

        gridEl.addEventListener('mousedown', (e) => { if(!isGameOver) { isDragging = true; processInput(e); }});
        window.addEventListener('mousemove', (e) => { if(isDragging && !isGameOver) { e.preventDefault(); processInput(e); } }, {passive: false});
        window.addEventListener('mouseup', () => isDragging = false);
        gridEl.addEventListener('touchstart', (e) => { if(!isGameOver) { isDragging = true; processInput(e); }}, {passive: false});
        gridEl.addEventListener('touchmove', (e) => { if(isDragging && !isGameOver) { e.preventDefault(); processInput(e); } }, {passive: false});
        window.addEventListener('touchend', () => isDragging = false);

        function processInput(e) {
            let clientX = e.clientX, clientY = e.clientY;
            if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            const rect = gridEl.getBoundingClientRect();
            if (clientX < rect.left || clientX > rect.right || clientY < rect.top || clientY > rect.bottom) return;
            const x = Math.floor((clientX - rect.left) / (rect.width / levelData.cols)), y = Math.floor((clientY - rect.top) / (rect.height / levelData.rows));
            if (x >= 0 && x < levelData.cols && y >= 0 && y < levelData.rows) tryMoveTo(x, y);
        }

        function tryMoveTo(x, y) {
            if (path.length === 0) return;
            const current = path[path.length - 1], pos = `${x},${y}`;
            if (current.x === x && current.y === y) return;
            if (path.length > 1) { const prev = path[path.length - 2]; if (prev.x === x && prev.y === y) { undoMove(); return; } }
            if ((Math.abs(x - current.x) === 1 && y === current.y) || (x === current.x && Math.abs(y - current.y) === 1)) {
                if (!visited.has(pos)) makeMove(x, y);
            }
        }

        function makeMove(x, y, isFirst = false) {
            const pos = `${x},${y}`; const currentCell = cells[pos];
            path.push({x, y}); visited.add(pos); currentCell.classList.add('visited');

            // Apply Costs
            if (!isFirst) {
                const cellMeta = levelData.data[pos];
                // Only charge for crossing empty routing tiles, not for hitting required services
                if (!cellMeta || (cellMeta.type !== 'checkpoint' && cellMeta.type !== 'end' && cellMeta.type !== 'bug')) {
                    currentCost += levelData.baseCost;
                }
            }

            if (!isFirst) {
                const prevCoord = path[path.length - 2], prevCell = cells[`${prevCoord.x},${prevCoord.y}`];
                const line = document.createElement('div'); line.className = 'line';
                if (x > prevCoord.x) line.classList.add('line-right'); else if (x < prevCoord.x) line.classList.add('line-left');
                else if (y > prevCoord.y) line.classList.add('line-down'); else if (y < prevCoord.y) line.classList.add('line-up');
                prevCell.appendChild(line); triggerHaptic('tick');
            }

            const dot = document.createElement('div'); dot.className = 'dot'; currentCell.appendChild(dot);
            
            const cellMeta = levelData.data[pos];
            const logStr = (levelData.logs[pos]) ? levelData.logs[pos] : (cellMeta && cellMeta.type === 'start' ? "Scenario starting..." : "> Network route created... +$50 Data Transfer Cost.");
            logMsg(logStr, levelData.logs[pos] ? "" : "log-cost");

            updateCostDisplay();

            // Fail Conditions
            if (currentCost > levelData.maxBudget) {
                logMsg(`[Interviewer] Your architecture is too inefficient. You exceeded the AWS budget. Failed.`, "log-err");
                isGameOver = true; isDragging = false; triggerHaptic('error'); return;
            }

            if (cellMeta && cellMeta.type === 'bug') {
                logMsg(`[Interviewer] That won't work in production. Interview Failed.`, "log-err");
                isGameOver = true; isDragging = false; triggerHaptic('error'); return;
            }

            if (cellMeta && cellMeta.type === 'checkpoint') {
                clearedCheckpoints.push(pos); currentCell.classList.add('cleared'); triggerHaptic('success');
            }

            updateCurrentHighlight();
            
            // Auto-check win if they hit the end
            if (x === levelData.endPos.x && y === levelData.endPos.y) submitArchitecture();
        }

        function undoMove() {
            const last = path.pop(), pos = `${last.x},${last.y}`; visited.delete(pos); cells[pos].classList.remove('visited');
            const dot = cells[pos].querySelector('.dot'); if(dot) dot.remove();
            
            const cellMeta = levelData.data[pos];
            if (cellMeta && cellMeta.type === 'checkpoint') { cells[pos].classList.remove('cleared'); clearedCheckpoints.pop(); }
            if (!cellMeta || (cellMeta.type !== 'checkpoint' && cellMeta.type !== 'end' && cellMeta.type !== 'bug')) {
                currentCost -= levelData.baseCost;
            }

            const prevCell = cells[`${path[path.length - 1].x},${path[path.length - 1].y}`];
            const lines = prevCell.querySelectorAll('.line'); if (lines.length > 0) lines[lines.length - 1].remove();
            triggerHaptic('tick'); updateCurrentHighlight(); updateCostDisplay();
            isGameOver = false; // Allow recovery if they went over budget
        }

        function updateCurrentHighlight() {
            Object.values(cells).forEach(c => c.classList.remove('current'));
            if (path.length > 0) cells[`${path[path.length - 1].x},${path[path.length - 1].y}`].classList.add('current');
        }

        // The New Win Condition Logic
        function submitArchitecture() {
            const current = path[path.length - 1];
            if (current.x !== levelData.endPos.x || current.y !== levelData.endPos.y) {
                logMsg("[Interviewer] You haven't connected to the final destination (RDS) yet.", "log-err");
                triggerHaptic('error'); return;
            }

            isGameOver = true; isDragging = false;
            
            if (JSON.stringify(clearedCheckpoints) === JSON.stringify(levelData.checkpoints)) {
                logMsg("[Interviewer] Excellent design. Direct, secure, and under budget.", "log-success"); 
                triggerHaptic('success'); showReport();
            } else {
                logMsg("[Interviewer] You missed core security/scaling requirements or did them out of order.", "log-err"); 
                triggerHaptic('error');
            }
        }

        function showReport() {
            document.getElementById('report-body').innerHTML = `
                <h2>✅ Section 4 Passed</h2><h3>${levelData.report.title}</h3><p>${levelData.report.desc}</p>
                <button class="btn-rpt" onclick="closeAllModals()">Finish Exam</button>
            `;
            setTimeout(() => { modals.report.style.display = 'flex'; }, 800);
        }
        function closeAllModals() { modals.briefing.style.display = 'none'; modals.report.style.display = 'none'; }
        
        startLevelBriefing();
    </script>
</body>
</html>
